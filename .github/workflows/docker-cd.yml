name: Docker CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-production-deploy
  cancel-in-progress: true

jobs:
  deploy-to-self-hosted:
    runs-on: self-hosted

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure environment file exists
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
            echo "Created .env from template. Replace placeholder values on the self-hosted runner." >&2
          fi

      - name: Deploy with Docker Compose
        run: docker compose up -d --build --remove-orphans

      - name: Verify deployed health endpoint
        run: |
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8000/healthz; then
              exit 0
            fi
            sleep 3
          done
          docker compose ps
          docker compose logs --tail=100
          exit 1

