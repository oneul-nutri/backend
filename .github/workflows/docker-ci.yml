name: Docker CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  docker-build-and-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Validate Docker Compose file
        run: docker compose config

      - name: Build application image
        run: docker build -t food-calorie-vision-backend:ci .

      - name: Start application container
        run: docker run -d --name food-calorie-vision-backend-ci --env-file .env -p 8000:8000 food-calorie-vision-backend:ci

      - name: Wait for health check
        run: |
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8000/healthz; then
              exit 0
            fi
            sleep 3
          done
          docker logs food-calorie-vision-backend-ci
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f food-calorie-vision-backend-ci

