services:
  app:
    build:
      context: .
    image: oneul-nutri-backend:local
    container_name: oneul-nutri-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    volumes:
      - ./models:/app/models

